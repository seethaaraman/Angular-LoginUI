name: Angular Jest Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  jest-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Run Jest Tests
        run: npm run test:jest
